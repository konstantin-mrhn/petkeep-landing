<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PetKeep — дневник питомца с AI-помощником</title>
<meta name="description" content="Дневник питомца с AI-помощником. История визитов, прививки, вес, напоминания — всё в одном месте.">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.wrap { max-width: 420px; padding: 2.5rem 1.5rem; text-align: center; }
.logo-img { width: 96px; height: 96px; border-radius: 22px; object-fit: cover; margin-bottom: 1.25rem; }
h1 { font-size: 26px; font-weight: 600; margin-bottom: 0.5rem; }
.sub { font-size: 16px; color: #a0a0b8; line-height: 1.6; margin-bottom: 2rem; }
.features { background: #252540; border-radius: 16px; padding: 1.25rem; margin-bottom: 2rem; text-align: left; display: flex; flex-direction: column; gap: 12px; }
.feat { display: flex; align-items: center; gap: 12px; font-size: 14px; color: #d0d0e8; }
.feat-icon { width: 32px; height: 32px; background: rgba(255,143,171,0.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.btn { display: inline-flex; align-items: center; gap: 8px; background: #FF8FAB; color: #fff; text-decoration: none; padding: 14px 28px; border-radius: 12px; font-size: 15px; font-weight: 500; margin-bottom: 1.5rem; }
.footer { font-size: 13px; color: #606080; }
</style>
</head>
<body>
<div class="wrap">
  <img class="logo-img" src="logo.png" alt="PetKeep">
  <h1>PetKeep</h1>
  <p class="sub">Дневник питомца с AI-помощником.<br>История визитов, прививки, вес<br>и напоминания — всё в одном месте.</p>
  <div class="features">
    <div class="feat"><div class="feat-icon">📋</div>История визитов и выписок</div>
    <div class="feat"><div class="feat-icon">💊</div>Умные напоминания таблеток</div>
    <div class="feat"><div class="feat-icon">💉</div>Прививки по российскому календарю</div>
    <div class="feat"><div class="feat-icon">🤖</div>AI-консультант знает вашего питомца</div>
  </div>
  <a class="btn" href="https://t.me/PetKeep">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    Следить за запуском
  </a>
  <div class="footer">Запуск скоро · petkeep.ru</div>
</div>
</body>
</html>
